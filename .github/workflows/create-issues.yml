name: Create Contributor Issues

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create all contributor issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const issues = [

              // ── NEWBIE (10 pts) ── good_first_issue template ─────────────

              {
                title: "[GOOD FIRST ISSUE] Add Footer component content",
                labels: ["frontend", "UI", "ELUSOC", "NEWBIE", "good first issue", "help wanted"],
                body: [
                  "## Task Description",
                  "",
                  "The Footer component exists at `src/components/layout/Footer.tsx` but has no content inside it. We need to fill it in so the site has a proper footer with navigation, social links, and a copyright line.",
                  "",
                  "## What You Need to Know",
                  "",
                  "- Relevant files: `src/components/layout/Footer.tsx`, `src/components/layout/Navbar.tsx` (for style reference)",
                  "- Concepts involved: React functional components, Tailwind CSS, responsive layout",
                  "",
                  "## Steps to Complete",
                  "",
                  "1. Open `src/components/layout/Footer.tsx`",
                  "2. Add the OSSfolio name or logo on the left side",
                  "3. Add navigation links: Home, Explore, and a GitHub link that opens in a new tab",
                  "4. Add social icons using `lucide-react` (Github, Twitter, Linkedin are all available)",
                  "5. Add a copyright line at the bottom: `2025 OSSfolio. Open source, forever free.`",
                  "6. Make sure it stacks vertically on mobile screens",
                  "",
                  "## Resources",
                  "",
                  "- Tailwind CSS docs: https://tailwindcss.com/docs",
                  "- lucide-react icons: https://lucide.dev/icons",
                  "- Look at `Navbar.tsx` to understand the color palette already in use",
                  "",
                  "## Definition of Done",
                  "",
                  "- [ ] Footer renders with logo, nav links, social icons, and copyright",
                  "- [ ] Layout is responsive and stacks on mobile",
                  "- [ ] Matches the dark design language of the rest of the site",
                  "- [ ] No new dependencies added",
                  "- [ ] PR opened and linked to this issue",
                ].join("\n"),
              },

              {
                title: "[GOOD FIRST ISSUE] Add animated stat counters to the Hero section",
                labels: ["frontend", "UI", "ELUSOC", "NEWBIE", "good first issue", "help wanted"],
                body: [
                  "## Task Description",
                  "",
                  "The Hero section at `src/components/home/Hero.tsx` shows static numbers like 10K+, 500K+, and 100%. These should count up from zero when the section comes into view. It makes the landing page feel more polished and draws attention to the stats.",
                  "",
                  "## What You Need to Know",
                  "",
                  "- Relevant files: `src/components/home/Hero.tsx`",
                  "- Concepts involved: Framer Motion animations, scroll-triggered effects, React hooks",
                  "- `framer-motion` is already installed, no new packages needed",
                  "",
                  "## Steps to Complete",
                  "",
                  "1. Open `src/components/home/Hero.tsx` and find the stat values",
                  "2. Create a small counter component or hook that animates a number from 0 to a target",
                  "3. Use Framer Motion's `useMotionValue` and `useSpring`, or the `animate` utility",
                  "4. Trigger the animation when the stats section scrolls into view using `whileInView` or `IntersectionObserver`",
                  "5. Set the animation duration to around 1.5 seconds with an ease-out curve",
                  "6. Verify it works correctly on both mobile and desktop",
                  "",
                  "## Resources",
                  "",
                  "- Framer Motion docs: https://www.framer.com/motion/",
                  "- `useMotionValue`: https://www.framer.com/motion/use-motion-value/",
                  "",
                  "## Definition of Done",
                  "",
                  "- [ ] Numbers animate upward from 0 when scrolled into view",
                  "- [ ] Animation uses framer-motion (no new dependencies)",
                  "- [ ] Works on mobile and desktop without layout shifts",
                  "- [ ] Existing Hero layout and text are unchanged",
                  "- [ ] PR opened and linked to this issue",
                ].join("\n"),
              },

              {
                title: "[GOOD FIRST ISSUE] Add loading skeleton states for the profile page",
                labels: ["frontend", "UI", "ELUSOC", "NEWBIE", "good first issue", "help wanted"],
                body: [
                  "## Task Description",
                  "",
                  "When someone visits a profile page like `ossfolio.me/username`, the page fetches data from GitHub which takes a moment. Right now there is nothing shown during that wait. We need loading skeletons for each section of the profile page so the experience does not feel broken.",
                  "",
                  "## What You Need to Know",
                  "",
                  "- Relevant files: `src/app/[username]/page.tsx`, `src/components/profile/` (all files in this folder)",
                  "- Concepts involved: Tailwind CSS animations, conditional rendering, loading states",
                  "- Use Tailwind's built-in `animate-pulse` class, no new packages needed",
                  "",
                  "## Steps to Complete",
                  "",
                  "1. Look at each component in `src/components/profile/` to understand their shapes",
                  "2. Create skeleton versions for at least three sections: ProfileHeader, StatsGrid, and TopRepos",
                  "3. Use `bg-neutral-800 animate-pulse rounded` blocks to represent each element",
                  "4. In `src/app/[username]/page.tsx`, show skeletons while data is loading",
                  "5. Replace skeletons with real components once data arrives",
                  "",
                  "## Resources",
                  "",
                  "- Tailwind animate-pulse: https://tailwindcss.com/docs/animation",
                  "- Example skeleton pattern: a div with `h-4 w-32 bg-neutral-800 animate-pulse rounded` mimics a text line",
                  "",
                  "## Definition of Done",
                  "",
                  "- [ ] Skeleton shown for ProfileHeader, StatsGrid, and TopRepos",
                  "- [ ] Pulse animation is visible during the loading state",
                  "- [ ] Skeletons are replaced by real content once data loads",
                  "- [ ] No new dependencies added",
                  "- [ ] PR opened and linked to this issue",
                ].join("\n"),
              },

              {
                title: "[GOOD FIRST ISSUE] Add a custom 404 page for unknown usernames",
                labels: ["frontend", "UI", "ELUSOC", "NEWBIE", "good first issue", "help wanted"],
                body: [
                  "## Task Description",
                  "",
                  "When someone visits a profile URL for a username that does not exist, they currently see a generic error or blank page. We need a friendly, on-brand not-found page that tells them what happened and gives them somewhere to go next.",
                  "",
                  "## What You Need to Know",
                  "",
                  "- Relevant files: `src/app/[username]/page.tsx`, new file to create at `src/app/[username]/not-found.tsx`",
                  "- Concepts involved: Next.js App Router not-found convention, `notFound()` function from `next/navigation`",
                  "",
                  "## Steps to Complete",
                  "",
                  "1. Create `src/app/[username]/not-found.tsx`",
                  "2. Add a message explaining that the username was not found or has not signed up yet",
                  "3. Add a link back to the home page and a link to the Explore page",
                  "4. Style it to match the dark design language of the rest of the site",
                  "5. In `src/app/[username]/page.tsx`, call `notFound()` from `next/navigation` when a user does not exist",
                  "",
                  "## Resources",
                  "",
                  "- Next.js not-found convention: https://nextjs.org/docs/app/api-reference/file-conventions/not-found",
                  "- `notFound()` function: https://nextjs.org/docs/app/api-reference/functions/not-found",
                  "",
                  "## Definition of Done",
                  "",
                  "- [ ] `not-found.tsx` created with a clear and friendly message",
                  "- [ ] Links back to Home and Explore are present",
                  "- [ ] Styled to match the site's design",
                  "- [ ] `notFound()` is called in `page.tsx` when the user does not exist",
                  "- [ ] PR opened and linked to this issue",
                ].join("\n"),
              },

              // ── ADVENTURER (25 pts) ── feature_request template ──────────

              {
                title: "[FEAT] Build the Explore page leaderboard UI",
                labels: ["frontend", "UI", "ELUSOC", "ADVENTURER", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "The Explore page at `src/app/explore/page.tsx` is a placeholder that says coming soon. Contributors and recruiters have no way to discover top open-source contributors through OSSfolio. This is one of the core features of the platform and it needs to be built.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Build a leaderboard UI that shows top contributors ranked by their OSSfolio score. The page should use static or mock data for now since the backend sync pipeline is a separate task. The focus here is purely on the UI.",
                  "",
                  "The page should include:",
                  "- A ranked list or card grid showing contributor avatar, username, score, merged PRs, and primary language",
                  "- Sort controls to switch between sorting by score, by PRs merged, and by commits",
                  "- A search input to filter the list by username",
                  "- Gold, silver, and bronze highlights for the top three contributors",
                  "- A responsive layout that works as a table on desktop and as stacked cards on mobile",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could wait until the real data pipeline is ready, but building the UI with mock data first lets us ship and iterate faster. The backend can be wired in later.",
                  "",
                  "## Additional Context",
                  "",
                  "- Score formula reference: `src/lib/score.ts`",
                  "- Contributor data shape: `ContributorProfile` type in `src/types/index.ts`",
                  "- Look at `src/components/profile/StatsGrid.tsx` for card styling reference",
                  "- `recharts` is already installed if you want to add any small chart elements",
                ].join("\n"),
              },

              {
                title: "[FEAT] Wire up NextAuth GitHub OAuth",
                labels: ["backend", "ELUSOC", "ADVENTURER", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "Authentication is partially set up but not working. The sign-in button exists in `AuthModal`, NextAuth is installed, and the route file at `src/app/api/auth/[...nextauth]/route.ts` is there, but the actual GitHub OAuth provider is not configured. Users cannot sign in.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Complete the NextAuth configuration to make GitHub OAuth work end to end.",
                  "",
                  "This includes:",
                  "- Setting up the GitHub provider in the NextAuth config with `GITHUB_CLIENT_ID` and `GITHUB_CLIENT_SECRET`",
                  "- Storing the GitHub access token in the session so it can be used for API calls later",
                  "- Including `user.login` (the GitHub username) in the session object",
                  "- Creating or updating a Supabase user record on first sign-in using the `signIn` callback",
                  "- Making sure sign-out clears the session properly",
                  "- Updating `.env.example` if any new environment variables are required",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could use Supabase Auth directly, but NextAuth gives us more control over the session shape and token storage, which is important for the GitHub API calls we make later.",
                  "",
                  "## Additional Context",
                  "",
                  "- NextAuth v4 GitHub provider docs: https://next-auth.js.org/providers/github",
                  "- Supabase client: `src/lib/supabase.ts`",
                  "- Extended session types: `src/types/next-auth.d.ts`",
                  "- The auth route to complete: `src/app/api/auth/[...nextauth]/route.ts`",
                ].join("\n"),
              },

              {
                title: "[FEAT] Complete profile page data fetching and component wiring",
                labels: ["frontend", "backend", "ELUSOC", "ADVENTURER", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "The profile page at `src/app/[username]/page.tsx` has a TODO comment and renders nothing useful. All the profile components exist and are ready, but none of them are connected to real data. A visitor to any profile URL sees an empty page.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Wire the profile page to the GitHub data fetching functions and render all profile components with real data.",
                  "",
                  "This includes:",
                  "- Calling `fetchContributorProfile(username)` from `src/lib/github.ts` inside the page",
                  "- Mapping the API response to the `ContributorProfile` type from `src/types/index.ts`",
                  "- Rendering `ProfileHeader`, `StatsGrid`, `TopRepos`, `TechStack`, and `Organizations` with real data",
                  "- Showing loading skeletons while data is being fetched",
                  "- Calling `notFound()` when a username does not exist on GitHub",
                  "- Handling errors gracefully when the GitHub API fails or hits a rate limit",
                  "- Using Next.js async server components for the fetch so it is server-side rendered",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could fetch data client-side with useEffect, but server-side rendering is better here for SEO and initial load performance since profile pages are meant to be shared.",
                  "",
                  "## Additional Context",
                  "",
                  "- GitHub fetching logic is already written in `src/lib/github.ts`",
                  "- Score calculation is in `src/lib/score.ts`",
                  "- All profile sub-components are in `src/components/profile/`",
                  "- The `ContributorProfile` type defines the exact data shape expected by each component",
                ].join("\n"),
              },

              {
                title: "[FEAT] Render the ContributionHeatmap from real GitHub data",
                labels: ["frontend", "backend", "ELUSOC", "ADVENTURER", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "The `ContributionHeatmap` component at `src/components/profile/ContributionHeatmap.tsx` exists but is not connected to real data. The GitHub GraphQL query already fetches the full contribution calendar, so the data is available. It just needs to be parsed and rendered into a proper heatmap grid.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Parse the `contributionCalendar` data from the GitHub GraphQL response and render it as a 52-week by 7-day heatmap grid inside the existing component.",
                  "",
                  "The heatmap should:",
                  "- Render a grid of 52 columns (weeks) and 7 rows (days)",
                  "- Color each cell based on contribution count using 4 intensity levels plus empty",
                  "- Show a tooltip on hover with the date and number of contributions",
                  "- Include month labels along the top of the grid",
                  "- Include day labels (Mon, Wed, Fri) on the left side",
                  "- Be horizontally scrollable on mobile so the full year is always accessible",
                  "- Use the emerald green color palette to match the rest of the design",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could use a third-party heatmap library, but a custom Tailwind grid is lighter, more flexible, and keeps us in control of the design.",
                  "",
                  "## Additional Context",
                  "",
                  "- The GraphQL query that fetches `contributionCalendar` is in `src/lib/github.ts`",
                  "- The component to fill in is `src/components/profile/ContributionHeatmap.tsx`",
                  "- GitHub uses these intensity thresholds: 0 contributions is empty, 1 to 3 is light, 4 to 6 is medium, 7 to 9 is dark, 10 or more is darkest",
                ].join("\n"),
              },

              // ── VETERAN (50 pts) ── feature_request template ─────────────

              {
                title: "[FEAT] Build the Supabase data sync pipeline with caching",
                labels: ["backend", "ELUSOC", "VETERAN", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "Every profile page visit would hit the GitHub API live. GitHub enforces a limit of 5000 requests per hour per token, which means a popular profile page would quickly exhaust the quota and start failing for all users. There is no caching layer in place today.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Build a Supabase-backed caching layer that fetches from GitHub once, stores the result, and serves from cache with a 24-hour TTL.",
                  "",
                  "This includes:",
                  "- A Supabase `contributors` table with columns for `username`, `profile_data` (JSONB), `last_synced_at`, and `score`",
                  "- A migration file in `supabase/` for the schema",
                  "- Row-level security policies so any user can read profiles but only the owner can update theirs",
                  "- Logic in the profile page to check the cache first and only call GitHub if the cache is stale or missing",
                  "- A fallback that serves stale data if GitHub fails rather than showing an error",
                  "- A `POST /api/sync/[username]` route that manually triggers a cache refresh",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could use Next.js built-in fetch caching, but Supabase gives us a persistent cross-request cache that survives deployments and can be queried for the leaderboard later.",
                  "",
                  "## Additional Context",
                  "",
                  "- Supabase client: `src/lib/supabase.ts`",
                  "- GitHub fetch logic: `src/lib/github.ts`",
                  "- Score calculation: `src/lib/score.ts`",
                  "- Use `SUPABASE_SERVICE_ROLE_KEY` on the server side to bypass RLS for writes",
                ].join("\n"),
              },

              {
                title: "[FEAT] Implement GSoC and GSSoC badge detection",
                labels: ["backend", "AI", "ELUSOC", "VETERAN", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "OSSfolio is designed for open-source program participants like GSoC and GSSoC contributors, but the platform currently has no way to detect or display program participation. This is one of the most important differentiators from a plain GitHub profile and it is entirely missing.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Design a detection strategy for at least GSoC and GSSoC, store the results in Supabase, and render the badges on the profile page.",
                  "",
                  "Detection approach:",
                  "- GSoC: check if the user has repos with the `google-summer-of-code` topic, or has commits/PRs in Google org repositories",
                  "- GSSoC: check if the user has PRs merged into GSSoC org repositories, or repos with the `gssoc` topic",
                  "",
                  "This includes:",
                  "- A Supabase `badges` table with columns for `username`, `program`, `year`, and `verified_at`",
                  "- A migration file in `supabase/` for the schema",
                  "- A route at `POST /api/badges/detect/[username]` that runs detection and saves results",
                  "- Badge detection integrated into the sync pipeline so it runs automatically",
                  "- Badge components rendered in or near `ProfileHeader`",
                  "- Visually distinct styling per program",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could rely on self-reported badges, but automated detection is more trustworthy and removes friction for contributors.",
                  "",
                  "## Additional Context",
                  "",
                  "- The GitHub GraphQL query in `src/lib/github.ts` can be extended to include org memberships and repo topics",
                  "- Be conservative with detection. False positives damage credibility more than false negatives.",
                  "- `ProfileHeader` is at `src/components/profile/ProfileHeader.tsx`",
                ].join("\n"),
              },

              {
                title: "[FEAT] Add full dark and light mode with a theme toggle",
                labels: ["frontend", "UI", "ELUSOC", "VETERAN", "help wanted"],
                body: [
                  "## Problem Statement",
                  "",
                  "OSSfolio has a fixed dark theme. Users who prefer light mode or who have their system set to light theme get no choice. Many contributor portfolios are viewed by recruiters during the day in well-lit environments where a light theme is more comfortable.",
                  "",
                  "## Proposed Solution",
                  "",
                  "Implement a proper theme system with a toggle in the Navbar, localStorage persistence, and system preference detection.",
                  "",
                  "This includes:",
                  "- A theme toggle button in `Navbar.tsx` using a sun and moon icon from `lucide-react`",
                  "- Light theme color palette applied across all components using Tailwind `dark:` variants",
                  "- Theme preference saved to `localStorage` and restored on the next visit",
                  "- Fallback to the system `prefers-color-scheme` setting if no preference has been saved",
                  "- No flash of the wrong theme on load. This requires injecting the theme class before hydration using a Next.js script with `beforeInteractive` strategy.",
                  "- Full audit of every component in `src/components/` to apply correct `dark:` classes",
                  "",
                  "## Alternatives Considered",
                  "",
                  "We could use a library like `next-themes`, which is a reasonable option and handles the SSR flash problem cleanly. If you choose this approach, document why in the PR.",
                  "",
                  "## Additional Context",
                  "",
                  "- Tailwind dark mode setup: enable `darkMode: 'class'` in the Tailwind config",
                  "- Every file in `src/components/` needs to be audited for dark mode classes",
                  "- This is a wide-surface task. Read through all components carefully before writing any code.",
                  "- The light theme should use white or very light slate backgrounds with dark text",
                ].join("\n"),
              },

            ];

            // Fetch existing issue titles to skip duplicates
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100,
            });
            const existingTitles = new Set(existing.map(i => i.title));

            let created = 0;
            let skipped = 0;

            for (const issue of issues) {
              if (existingTitles.has(issue.title)) {
                console.log(`~ Skipped (already exists): ${issue.title}`);
                skipped++;
                continue;
              }

              await github.rest.issues.create({
                owner,
                repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });

              console.log(`✓ Created: ${issue.title}`);
              created++;

              // Brief pause to avoid GitHub secondary rate limits
              await new Promise(r => setTimeout(r, 500));
            }

            console.log(`\nDone. Created: ${created} | Skipped: ${skipped}`);
