name: Create Labels

on:
  workflow_dispatch:

jobs:
  labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create all labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // ELUSOC required — must match exactly for the sync bot
              { name: "ELUSOC",       color: "7B2FBE", description: "Required tracking label for ELUSOC contributions" },
              { name: "NEWBIE",       color: "2da44e", description: "Beginner — 10 pts" },
              { name: "ADVENTURER",   color: "fb8f44", description: "Intermediate — 25 pts" },
              { name: "VETERAN",      color: "d93f0b", description: "Advanced — 50 pts" },

              // Project labels
              { name: "frontend",     color: "0075ca", description: "Related to UI / Next.js / Tailwind" },
              { name: "backend",      color: "e4e669", description: "Related to Supabase / API / database" },
              { name: "documentation",color: "0075ca", description: "Improvements or additions to docs" },
              { name: "AI",           color: "f9d0c4", description: "AI features — contributor summary, scoring" },
              { name: "UI",           color: "bfd4f2", description: "Visual / design changes" },
              { name: "help wanted",  color: "008672", description: "Open for anyone to pick up" },
              { name: "good first issue", color: "7057ff", description: "Easy entry point for new contributors" },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`✓ Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  // Already exists — update it to make sure name/color/description are correct
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  console.log(`~ Updated existing: ${label.name}`);
                } else {
                  console.error(`✗ Failed: ${label.name}`, e.message);
                  throw e;
                }
              }
            }
